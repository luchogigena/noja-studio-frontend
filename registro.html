<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrarse - Noja Studio</title>
  </head>
  <body class="bg-stone-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
      <h1 class="text-2xl font-bold text-stone-800 mb-6 text-center">Crear cuenta</h1>

      <form id="form-registro" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Nombre</label>
          <input
            type="text"
            id="nombre"
            required
            class="w-full border border-stone-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Email</label>
          <input
            type="email"
            id="email"
            required
            class="w-full border border-stone-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Contraseña</label>
          <input
            type="password"
            id="password"
            required
            minlength="6"
            class="w-full border border-stone-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-pink-400"
          />
        </div>

        <p id="mensaje-error" class="text-red-600 text-sm hidden"></p>

        <button
          type="submit"
          class="w-full bg-pink-600 text-white font-medium py-2 rounded-md hover:bg-pink-700 transition"
        >
          Crear cuenta
        </button>
      </form>

      <p class="text-sm text-stone-600 mt-4 text-center">
        ¿Ya tenés cuenta? <a href="/login.html" class="text-pink-600 font-medium">Iniciá sesión</a>
      </p>
    </div>

    <script type="module" src="/src/registro.js"></script>
  </body>
</html>
